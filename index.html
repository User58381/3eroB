<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tabla de Puntos - 1ero B</title>
<style>
  body{font-family:"Comic Sans MS","Comic Sans","Comic Neue",cursive;background:#fff;color:#111;margin:0;text-align:center}
  h1{margin:18px 0 6px;font-size:32px}
  #fecha{margin:16px auto 10px;padding:8px 12px;border:1px solid #e5e5e5;border-radius:10px;background:#f7f7f7;font-weight:bold}
  .controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:8px 0}
  .controls input{padding:8px 10px;border:1px solid #d0d0d0;border-radius:8px}
  .toggle{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid #e0e0e0;border-radius:999px;background:#fafafa}
  #status{font-size:14px;color:#666;margin:6px 0 12px}
  table{width:96%;max-width:1200px;margin:auto;border-collapse:collapse;border:1px solid #e0e0e0;background:#fff}
  th,td{border:1px solid #d6d6d6;padding:10px;text-align:center}
  thead th{background:gold;position:sticky;top:0}
</style>
</head>
<body>
  <h1>Tabla de Puntos - 1ero B</h1>
  <div id="fecha"></div>

  <div class="controls">
    <input type="date" id="filtroFecha" onchange="render()"/>
    <input type="text" id="buscador" placeholder="Buscar alumno..." onkeyup="filtrarTabla()"/>
    <label class="toggle"><input type="checkbox" id="mostrarTodos" onchange="render()"/>Mostrar todos</label>
  </div>

  <div id="status">Cargando datos…</div>

  <table>
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Alumno</th>
        <th>Asistencia</th>
        <th>Puntos</th>
        <th>Trabajó</th>
        <th>Rango</th>
        <th>Recompensas</th>
      </tr>
    </thead>
    <tbody id="tablaPuntos">
      <tr><td colspan="7">Cargando…</td></tr>
    </tbody>
  </table>

<script>
const SHEET_ID="1kapF-_njiRV8aTTADXhOprHvoUFXg74lE93wl54j4qI";

const GID_PUNTOS="0";
const GID_ASISTENCIA="1488687689";
const GID_REG_TRABAJOS="1051341664";
const GID_PRESETS="1645658317";

let puntosData=[];
let asistenciaData=[];
let asistencia={};

function setStatus(t){document.getElementById("status").textContent=t}

function hoyISO(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function actualizarCabecera(){
  document.getElementById("fecha").innerHTML =
    `📅 Hoy es: <b>${new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</b>`;
}

function obtenerRango(p){
  if(p>=90)return"🌈🔥 Gran maestro arcoiris";
  if(p>=80)return"🌈 Heroico arcoiris";
  if(p>=70)return"🟠🔥 Heroico élite";
  if(p>=60)return"🟡 Heroico";
  if(p>=50)return"🔴 Gran Maestro";
  if(p>=40)return"🟠 Maestro";
  if(p>=30)return"🟣 Experto";
  if(p>=20)return"🔵 Avanzado";
  if(p>=10)return"🟢 Trabajador";
  return"⚪ Sin rango";
}

function obtenerRecompensas(p){
  let r="✨";
  for(let i=0;i<Math.floor(p/30);i++)r+="🌟";
  for(let i=0;i<Math.floor((p%30)/10);i++)r+="⭐";
  if(p>=70)r+=" 🌌";
  if(p>=90)r+=" 🌈";
  return r;
}

function filtrarTabla(){
  const f=document.getElementById("filtroFecha").value;
  const n=(document.getElementById("buscador").value||"").toLowerCase().trim();

  document.querySelectorAll("#tablaPuntos tr").forEach(tr=>{
    const F=tr.cells[0]?.innerText||"";
    const N=(tr.cells[1]?.innerText||"").toLowerCase();
    tr.style.display=(!f||F===f)&&(!n||N.includes(n))?"":"none";
  });
}

function clean(n){
  return String(n||"")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

function parseCSV(csv){
  const rows=[];
  let row=[], cell="", inQuotes=false;

  for(let i=0;i<csv.length;i++){
    const ch=csv[i];
    const next=csv[i+1];

    if(ch === '"'){
      if(inQuotes && next === '"'){
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if(ch === ',' && !inQuotes){
      row.push(cell);
      cell = "";
    } else if((ch === '\n' || ch === '\r') && !inQuotes){
      if(ch === '\r' && next === '\n') i++;
      row.push(cell);
      if(row.some(x => String(x).trim() !== "")) rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += ch;
    }
  }

  row.push(cell);
  if(row.some(x => String(x).trim() !== "")) rows.push(row);

  return rows;
}

async function fetchSheet(gid){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error("HTTP "+res.status);
  const text=await res.text();
  return parseCSV(text);
}

function buscarColumnaFecha(headers, fechaISO){
  if(!headers || !headers.length) return -1;

  const [y,m,d]=fechaISO.split("-");
  const opciones = [
    fechaISO,
    `${d}/${m}/${y}`,
    `${d}-${m}-${y}`,
    `${y}/${m}/${d}`,
    `${d}/${m}/${String(y).slice(2)}`,
    `${d}-${m}-${String(y).slice(2)}`
  ].map(x=>x.trim());

  for(let i=0;i<headers.length;i++){
    const h=String(headers[i]||"").trim();
    if(opciones.includes(h)) return i;
  }
  return -1;
}

function buildAsistencia(){
  asistencia = {};
  if(!asistenciaData.length) return;

  const headers = asistenciaData[0];

  for(let j=1;j<headers.length;j++){
    const fecha = String(headers[j]||"").trim();
    if(!fecha) continue;

    asistencia[fecha] = new Set();

    for(let i=1;i<asistenciaData.length;i++){
      const nombre = asistenciaData[i][0];
      const valor = String(asistenciaData[i][j]||"").trim();
      if(valor === "1"){
        asistencia[fecha].add(clean(nombre));
      }
    }
  }
}

function render(){
  const tbody=document.getElementById("tablaPuntos");
  tbody.innerHTML="";

  if(!puntosData.length){
    tbody.innerHTML=`<tr><td colspan="7">No hay datos de puntos</td></tr>`;
    return;
  }

  const fechaISO = document.getElementById("filtroFecha").value || hoyISO();
  const mostrarTodos = document.getElementById("mostrarTodos").checked;

  const headersP = puntosData[0];
  const colFechaPuntos = buscarColumnaFecha(headersP, fechaISO);

  if(colFechaPuntos === -1){
    tbody.innerHTML=`<tr><td colspan="7">No encontré esa fecha en la hoja de Puntos</td></tr>`;
    setStatus(`No encontré la fecha ${fechaISO} en Puntos.`);
    return;
  }

  let colFechaAsistencia = -1;
  let keyAsistencia = null;

  for(const k of Object.keys(asistencia)){
    const idx = buscarColumnaFecha(["", k], fechaISO);
    if(idx !== -1){
      keyAsistencia = k;
      colFechaAsistencia = 1;
      break;
    }
  }

  if(!keyAsistencia){
    tbody.innerHTML=`<tr><td colspan="7">No encontré esa fecha en la hoja de Asistencia</td></tr>`;
    setStatus(`No encontré la fecha ${fechaISO} en Asistencia.`);
    return;
  }

  const presentes = asistencia[keyAsistencia] || new Set();
  let encontrados = 0;

  for(let i=1;i<puntosData.length;i++){
    const nombre = puntosData[i][0];
    if(!nombre) continue;

    const nombreLimpio = clean(nombre);
    const asistio = presentes.has(nombreLimpio);
    if(!asistio) continue;

    let puntos = parseInt(String(puntosData[i][colFechaPuntos]||"").replace(/[^\d-]/g,""),10);
    if(Number.isNaN(puntos)) puntos = 0;

    if(puntos === 0 && !mostrarTodos) continue;

    encontrados++;

    tbody.innerHTML += `
      <tr>
        <td>${fechaISO}</td>
        <td>${nombre}</td>
        <td>✅ Sí</td>
        <td>${puntos}</td>
        <td>${puntos>0?"✅ Sí":"❌ No"}</td>
        <td>${obtenerRango(puntos)}</td>
        <td>${obtenerRecompensas(puntos)}</td>
      </tr>
    `;
  }

  if(encontrados === 0){
    tbody.innerHTML=`<tr><td colspan="7">No hubo alumnos para mostrar en esa fecha</td></tr>`;
    setStatus(`La fecha existe, pero no hubo coincidencias entre asistencia y puntos.`);
    return;
  }

  setStatus(`Mostrando ${encontrados} alumnos de la fecha ${fechaISO}.`);
  filtrarTabla();
}

async function cargar(){
  actualizarCabecera();
  document.getElementById("filtroFecha").value = hoyISO();
  setStatus("Cargando datos...");

  try{
    puntosData = await fetchSheet(GID_PUNTOS);
    asistenciaData = await fetchSheet(GID_ASISTENCIA);
    buildAsistencia();

    setStatus("Datos cargados correctamente.");
    render();
  }catch(e){
    console.error(e);
    setStatus("Error al cargar. Revisa permisos de la hoja o formato.");
    document.getElementById("tablaPuntos").innerHTML =
      `<tr><td colspan="7">Error al cargar datos</td></tr>`;
  }
}

cargar();
</script>
</body>
</html>
